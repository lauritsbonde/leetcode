name: Publish progress page

# Builds a progress page from the solved problem dirs and publishes it to the
# gh-pages branch. The main branch is never modified — no auto-commits.
on:
  push:
    branches: [main, master]
    paths:
      - "[0-9][0-9][0-9][0-9]-*/**"
      - "stats.py"
      - ".github/workflows/stats.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build page
        run: |
          mkdir -p site
          python3 stats.py --page site/index.md
          # Cayman theme renders the markdown with a clean default style.
          printf 'theme: jekyll-theme-cayman\n' > site/_config.yml

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          # Orphan branch, force-pushed each run — keeps no history noise.
          force_orphan: true
